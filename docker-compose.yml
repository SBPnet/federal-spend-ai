services:
  federalspendai:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - federalspendai-data:/data
    environment:
      FEDERALSPEND_DATA_DIR: /data
      FEDERALSPEND_ENGINE_ENABLED: "true"
      FEDERALSPEND_ENGINE_DATASETS: awards,public_accounts
      FEDERALSPEND_ENGINE_POLL_INTERVAL_SECONDS: "3600"
      FEDERALSPEND_ENGINE_RUN_ON_START: "true"
      # FEDERALSPEND_SUBSTRATE_EVENT_URL: http://substrate:8080/events
    command: ["federalspendai", "engine", "--transport", "sse", "--port", "8000"]

  init:
    build: .
    volumes:
      - federalspendai-data:/data
      - ./tests/fixtures:/fixtures:ro
    environment:
      FEDERALSPEND_DATA_DIR: /data
    command: >
      sh -c "
        federalspendai ingest --datasets awards,public_accounts --fixture-dir /fixtures &&
        federalspendai embed
      "
    profiles: ["init"]

  engine-once:
    build: .
    volumes:
      - federalspendai-data:/data
    environment:
      FEDERALSPEND_DATA_DIR: /data
      FEDERALSPEND_ENGINE_DATASETS: awards,public_accounts
    command: ["federalspendai", "engine", "--once", "--json"]
    profiles: ["init"]

volumes:
  federalspendai-data:
